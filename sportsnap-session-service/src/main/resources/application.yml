spring:
  application:
    name: sportsnap-session-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sportsnap_session}
    username: ${DB_USER:sportsnap}
    password: ${DB_PASS:sportsnap}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8083
