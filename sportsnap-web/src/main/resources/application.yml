spring:
  application:
    name: sportsnap-web
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sportsnap_web}
    username: ${DB_USER:sportsnap}
    password: ${DB_PASS:sportsnap}
  jpa:
    hibernate:
      ddl-auto: update

sportsnap:
  gamification:
    url: ${GAMIFICATION_URL:http://localhost:8081}
  marketplace:
    url: ${MARKETPLACE_URL:http://localhost:8082}
  session:
    url: ${SESSION_URL:http://localhost:8083}

server:
  port: 8080

vaadin:
  launch-browser: false
